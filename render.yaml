services:
  - type: web
    name: line-art-reviewer
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python cli.py serve
    envVars:
      - key: PORT
        value: 10000
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: GOOGLE_API_KEYS
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
    healthCheckPath: /health
    plan: free
